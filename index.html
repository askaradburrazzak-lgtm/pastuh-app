<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<title>Пастух</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    background: #1a1a1a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  body {
    padding-bottom: env(safe-area-inset-bottom);
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
  }
  input, select {
    font-family: inherit;
    outline: none;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(180deg, #1a1a1a 0%, rgba(26,26,26,0.95) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a2a;
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: #ffffff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 70%;
  }
  .header-subtitle {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  .icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: #2a2a2a;
    color: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }
  .icon-btn:active {
    background: #333;
    transform: scale(0.95);
  }
  .icon-btn svg {
    width: 22px;
    height: 22px;
  }

  /* Main */
  .main {
    padding: 16px 16px 100px 16px;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: #2a2a2a;
    border-radius: 16px;
    padding: 16px;
    border: 1px solid #333;
  }
  .summary-label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .summary-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .summary-value.accent {
    color: #22c55e;
  }

  /* Warning */
  .warning {
    background: linear-gradient(135deg, #7c2d12 0%, #431407 100%);
    border: 1px solid #9a3412;
    color: #fed7aa;
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 16px;
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .warning-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    margin-top: 1px;
  }

  /* Client list */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 20px 4px 12px 4px;
  }
  .clients-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .client-card {
    background: #2a2a2a;
    border-radius: 16px;
    padding: 14px 16px;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform 0.15s;
  }
  .client-card:active {
    transform: scale(0.99);
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }
  .client-info {
    flex: 1;
    min-width: 0;
  }
  .client-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .client-meta {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
  }
  .client-amount {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    text-align: right;
    white-space: nowrap;
  }
  .client-amount.paid {
    color: #22c55e;
  }
  .pay-btn {
    background: #22c55e;
    color: #fff;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 6px;
    transition: background 0.2s, transform 0.1s;
  }
  .pay-btn:active {
    background: #16a34a;
    transform: scale(0.95);
  }
  .pay-btn:disabled {
    background: #3a3a3a;
    color: #777;
    cursor: not-allowed;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #666;
  }
  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .empty-state-text {
    font-size: 15px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #22c55e;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
    z-index: 40;
    transition: transform 0.15s;
  }
  .fab:active {
    transform: scale(0.92);
  }
  .fab svg {
    width: 28px;
    height: 28px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.active {
    display: flex;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal {
    background: #222;
    width: 100%;
    max-width: 520px;
    max-height: 92vh;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom)) 20px;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @media (min-width: 600px) {
    .modal {
      border-radius: 24px;
      margin-bottom: 20px;
      max-height: 85vh;
    }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: #444;
    border-radius: 2px;
    margin: 0 auto 16px auto;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #fff;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-input, .form-select {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    padding: 13px 14px;
    border-radius: 12px;
    font-size: 15px;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus {
    border-color: #22c55e;
  }
  .form-input::placeholder {
    color: #555;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:active {
    transform: scale(0.98);
  }
  .btn-primary {
    background: #22c55e;
    color: #fff;
  }
  .btn-primary:active {
    background: #16a34a;
  }
  .btn-secondary {
    background: #333;
    color: #fff;
  }
  .btn-danger {
    background: #7f1d1d;
    color: #fecaca;
  }

  /* Sync indicator */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #2a2a2a;
    color: #888;
    margin-left: 8px;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #888;
  }
  .sync-badge.online .sync-dot {
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
  }
  .sync-badge.pending .sync-dot {
    background: #f59e0b;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-10px);
  }
  .toast.success {
    background: #166534;
    border: 1px solid #22c55e;
  }
  .toast.error {
    background: #7f1d1d;
    border: 1px solid #ef4444;
  }
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title" id="headerTitle">Пастух</div>
    <div class="header-subtitle" id="headerSubtitle">
      <span id="statusText">Учёт выпаса скота</span>
      <span class="sync-badge" id="syncBadge">
        <span class="sync-dot"></span>
        <span id="syncLabel">—</span>
      </span>
    </div>
  </div>
  <button class="icon-btn" id="settingsBtn" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>
</header>

<main class="main">
  <div id="warningBox" class="warning" style="display:none;">
    <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
      <line x1="12" y1="9" x2="12" y2="13"></line>
      <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <span id="warningText"></span>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="summary-label" id="lblClients">Клиенты</div>
      <div class="summary-value" id="sumClients">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" id="lblHeads">Всего голов</div>
      <div class="summary-value" id="sumHeads">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" id="lblDebt">Общий долг</div>
      <div class="summary-value accent" id="sumDebt">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" id="lblPaid">Оплачено</div>
      <div class="summary-value" id="sumPaid">0</div>
    </div>
  </div>

  <div class="section-title" id="lblList">Список клиентов</div>
  <div id="clientsList" class="clients-list"></div>
</main>

<button class="fab" id="addBtn" aria-label="Add">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"></line>
    <line x1="5" y1="12" x2="19" y2="12"></line>
  </svg>
</button>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="settingsTitle">Настройки</div>

    <div class="form-group">
      <label class="form-label" id="lblLang">Язык интерфейса</label>
      <select class="form-select" id="setLang">
        <option value="ru">Русский</option>
        <option value="kk">Қазақша</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label" id="lblFarm">Название хозяйства / аула</label>
      <input type="text" class="form-input" id="setFarm" placeholder="Например: Аул «Көкжайлау»">
    </div>

    <div class="form-group">
      <label class="form-label" id="lblUrl">URL Google Web App (скрипт таблицы)</label>
      <input type="url" class="form-input" id="setUrl" placeholder="https://script.google.com/macros/s/...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" id="lblTariff">Тариф за 1 голову</label>
        <input type="number" class="form-input" id="setTariff" placeholder="1000" min="0" step="any">
      </div>
      <div class="form-group">
        <label class="form-label" id="lblCurrency">Валюта</label>
        <select class="form-select" id="setCurrency">
          <option value="₸">₸ (Тенге)</option>
          <option value="₽">₽ (Рубль)</option>
          <option value="$">$ (Доллар)</option>
          <option value="сом">сом (Кыргызсом)</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="settingsCancel">Отмена</button>
      <button class="btn btn-primary" id="settingsSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Add Client Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addTitle">Новый клиент</div>

    <div class="form-group">
      <label class="form-label" id="lblName">ФИО клиента</label>
      <input type="text" class="form-input" id="addName" placeholder="Иванов Иван">
    </div>

    <div class="form-group">
      <label class="form-label" id="lblHeadsInput">Количество голов</label>
      <input type="number" class="form-input" id="addHeads" placeholder="10" min="1" step="1">
    </div>

    <div class="form-group">
      <label class="form-label" id="lblNote">Заметка (необязательно)</label>
      <input type="text" class="form-input" id="addNote" placeholder="Овец, летние пастбища">
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="addCancel">Отмена</button>
      <button class="btn btn-primary" id="addSave">Добавить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    offline: "offline",
    pending: "pending",
    fillName: "Enter client name",
    fillHeads: "Enter number of heads",
    delete: "Delete",
    deleteConfirm: "Delete this client?",
    settingsReset: "Reset all data?"
  }
};

/* ============================================================
   СОСТОЯНИЕ И LOCALSTORAGE
   ============================================================ */
const STORAGE_KEYS = {
  settings: "pst_settings_v1",
  clients: "pst_clients_v1",
  pending: "pst_pending_v1"
};

const DEFAULT_SETTINGS = {
  lang: "ru",
  farm: "",
  url: "",
  tariff: 0,
  currency: "₸"
};

let state = {
  settings: loadJSON(STORAGE_KEYS.settings, DEFAULT_SETTINGS),
  clients: loadJSON(STORAGE_KEYS.clients, []),
  pending: loadJSON(STORAGE_KEYS.pending, []),
  isOnline: navigator.onLine
};

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function t(key) {
  const lang = state.settings.lang || "ru";
  return (I18N[lang] && I18N[lang][key]) || I18N.ru[key] || key;
}

/* ============================================================
   ПРИМЕНЕНИЕ НАСТРОЕК К UI
   ============================================================ */
function applyI18N() {
  document.documentElement.lang = state.settings.lang || "ru";

  const farmName = (state.settings.farm || "").trim();
  document.getElementById("headerTitle").textContent = farmName || t("appTitle");
  document.getElementById("statusText").textContent = t("subtitle");

  document.getElementById("settingsTitle").textContent = t("settings");
  document.getElementById("lblLang").textContent = t("lang");
  document.getElementById("lblFarm").textContent = t("farm");
  document.getElementById("lblUrl").textContent = t("url");
  document.getElementById("lblTariff").textContent = t("tariff");
  document.getElementById("lblCurrency").textContent = t("currency");
  document.getElementById("settingsSave").textContent = t("save");
  document.getElementById("settingsCancel").textContent = t("cancel");

  document.getElementById("addTitle").textContent = t("addClient");
  document.getElementById("lblName").textContent = t("name");
  document.getElementById("lblHeadsInput").textContent = t("heads");
  document.getElementById("lblNote").textContent = t("note");
  document.getElementById("addSave").textContent = t("add");
  document.getElementById("addCancel").textContent = t("cancel");

  document.getElementById("lblClients").textContent = t("clients");
  document.getElementById("lblHeads").textContent = t("totalHeads");
  document.getElementById("lblDebt").textContent = t("totalDebt");
  document.getElementById("lblPaid").textContent = t("totalPaid");
  document.getElementById("lblList").textContent = t("list");
}

function formatMoney(n) {
  const c = state.settings.currency || "₸";
  const num = Number(n || 0);
  const rounded = Math.round(num * 100) / 100;
  const formatted = rounded.toLocaleString("ru-RU", { maximumFractionDigits: 2 });
  return `${formatted} ${c}`;
}

function renderAll() {
  applyI18N();
  renderWarning();
  renderSummary();
  renderClients();
  renderSyncStatus();
}

function renderWarning() {
  const box = document.getElementById("warningBox");
  const url = (state.settings.url || "").trim();
  if (!url) {
    document.getElementById("warningText").textContent = t("warningNoUrl");
    box.style.display = "flex";
  } else {
    box.style.display = "none";
  }
}

function renderSummary() {
  const clients = state.clients;
  const tariff = Number(state.settings.tariff || 0);
  let totalHeads = 0;
  let totalDebt = 0;
  let totalPaid = 0;

  clients.forEach(c => {
    const heads = Number(c.heads || 0);
    totalHeads += heads;
    const debt = heads * tariff;
    const paid = Number(c.paid || 0);
    totalDebt += debt;
    totalPaid += paid;
  });

  document.getElementById("sumClients").textContent = clients.length;
  document.getElementById("sumHeads").textContent = totalHeads;
  document.getElementById("sumDebt").textContent = formatMoney(totalDebt);
  document.getElementById("sumPaid").textContent = formatMoney(totalPaid);
}

function getInitials(name) {
  const parts = String(name || "").trim().split(/\s+/);
  if (!parts[0]) return "?";
  if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
  return (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase();
}

function renderClients() {
  const list = document.getElementById("clientsList");
  const clients = state.clients;
  const tariff = Number(state.settings.tariff || 0);

  if (clients.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🐄</div>
        <div class="empty-state-text">${t("empty")}</div>
      </div>
    `;
    return;
  }

  list.innerHTML = "";
  clients.forEach(c => {
    const heads = Number(c.heads || 0);
    const debt = heads * tariff;
    const paid = Number(c.paid || 0);
    const remaining = Math.max(0, debt - paid);
    const isPaid = remaining <= 0 && debt > 0;

    const card = document.createElement("div");
    card.className = "client-card";
    card.innerHTML = `
      <div class="avatar">${getInitials(c.name)}</div>
      <div class="client-info">
        <div class="client-name">${escapeHtml(c.name)}</div>
        <div class="client-meta">${heads} ${t("headsShort")}${c.note ? " • " + escapeHtml(c.note) : ""}</div>
        ${debt > 0 ? `<button class="pay-btn" data-id="${c.id}" ${isPaid ? "disabled" : ""}>${isPaid ? t("paid") : t("pay")}</button>` : ""}
      </div>
      <div class="client-amount ${isPaid ? "paid" : ""}">
        ${debt > 0 ? formatMoney(remaining) : "—"}
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll(".pay-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.getAttribute("data-id");
      payClient(id);
    });
  });
}

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

function renderSyncStatus() {
  const badge = document.getElementById("syncBadge");
  const label = document.getElementById("syncLabel");
  badge.classList.remove("online", "offline", "pending");

  if (state.pending.length > 0) {
    badge.classList.add("pending");
    label.textContent = `${t("pending")} · ${state.pending.length}`;
  } else if (state.isOnline) {
    badge.classList.add("online");
    label.textContent = t("online");
  } else {
    label.textContent = t("offline");
  }
}

/* ============================================================
   ДЕЙСТВИЯ
   ============================================================ */
function addClient(name, heads, note) {
  const client = {
    id: "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    name: String(name || "").trim(),
    heads: Number(heads || 0),
    note: String(note || "").trim(),
    paid: 0,
    createdAt: Date.now()
  };
  state.clients.push(client);
  saveJSON(STORAGE_KEYS.clients, state.clients);
  enqueueSync({ action: "add_client", client });
  renderAll();
  showToast(t("clientAdded"), "success");
}

function payClient(id) {
  const client = state.clients.find(c => c.id === id);
  if (!client) return;

  const tariff = Number(state.settings.tariff || 0);
  const debt = Number(client.heads || 0) * tariff;
  const toPay = Math.max(0, debt - Number(client.paid || 0));
  if (toPay <= 0) return;

  client.paid = (Number(client.paid || 0) + toPay);
  saveJSON(STORAGE_KEYS.clients, state.clients);

  enqueueSync({
    action: "pay",
    clientId: client.id,
    amount: toPay,
    paidAt: Date.now()
  });

  renderAll();
  showToast(t("paymentSent"), "success");
}

function enqueueSync(entry) {
  if (!entry) return;
  state.pending.push(entry);
  saveJSON(STORAGE_KEYS.pending, state.pending);
  renderSyncStatus();
  trySync();
}

async function trySync() {
  if (!state.isOnline) return;
  if (state.pending.length === 0) return;
  const url = (state.settings.url || "").trim();
  if (!url) return;

  const batch = state.pending.slice();
  try {
    const res = await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ batch, settings: {
        farm: state.settings.farm,
        tariff: state.settings.tariff,
        currency: state.settings.currency
      }})
    });
    // no-cors не даёт прочитать ответ, но запрос уходит
    state.pending = [];
    saveJSON(STORAGE_KEYS.pending, state.pending);
    renderSyncStatus();
  } catch (e) {
    // оставим в очереди, попробуем позже
    console.warn("Sync failed, will retry later", e);
  }
}

/* ============================================================
   ТОСТ
   ============================================================ */
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + (type || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.className = "toast " + (type || "");
  }, 2200);
}

/* ============================================================
   МОДАЛЬНЫЕ ОКНА
   ============================================================ */
function openModal(id) {
  document.getElementById(id).classList.add("active");
}
function closeModal(id) {
  document.getElementById(id).classList.remove("active");
}

function openSettings() {
  document.getElementById("setLang").value = state.settings.lang || "ru";
  document.getElementById("setFarm").value = state.settings.farm || "";
  document.getElementById("setUrl").value = state.settings.url || "";
  document.getElementById("setTariff").value = state.settings.tariff || "";
  document.getElementById("setCurrency").value = state.settings.currency || "₸";
  openModal("settingsModal");
}

function saveSettings() {
  state.settings = {
    lang: document.getElementById("setLang").value || "ru",
    farm: document.getElementById("setFarm").value.trim(),
    url: document.getElementById("setUrl").value.trim(),
    tariff: Number(document.getElementById("setTariff").value || 0),
    currency: document.getElementById("setCurrency").value || "₸"
  };
  saveJSON(STORAGE_KEYS.settings, state.settings);
  closeModal("settingsModal");
  renderAll();
  trySync();
  showToast(t("saved"), "success");
}

function openAdd() {
  document.getElementById("addName").value = "";
  document.getElementById("addHeads").value = "";
  document.getElementById("addNote").value = "";
  openModal("addModal");
  setTimeout(() => document.getElementById("addName").focus(), 300);
}

function saveAdd() {
  const name = document.getElementById("addName").value.trim();
  const heads = document.getElementById("addHeads").value.trim();
  const note = document.getElementById("addNote").value.trim();
  if (!name) { showToast(t("fillName"), "error"); return; }
  if (!heads || Number(heads) <= 0) { showToast(t("fillHeads"), "error"); return; }
  addClient(name, Number(heads), note);
  closeModal("addModal");
}

/* ============================================================
   СОБЫТИЯ
   ============================================================ */
document.getElementById("settingsBtn").addEventListener("click", openSettings);
document.getElementById("settingsSave").addEventListener("click", saveSettings);
document.getElementById("settingsCancel").addEventListener("click", () => closeModal("settingsModal"));

document.getElementById("addBtn").addEventListener("click", openAdd);
document.getElementById("addSave").addEventListener("click", saveAdd);
document.getElementById("addCancel").addEventListener("click", () => closeModal("addModal"));

// Закрытие модалок по клику на оверлей
document.querySelectorAll(".modal-overlay").forEach(ov => {
  ov.addEventListener("click", (e) => {
    if (e.target === ov) ov.classList.remove("active");
  });
});

// Онлайн / оффлайн
window.addEventListener("online", () => {
  state.isOnline = true;
  renderSyncStatus();
  trySync();
});
window.addEventListener("offline", () => {
  state.isOnline = false;
  renderSyncStatus();
});

/* ============================================================
   СТАРТ
   ============================================================ */
renderAll();
</script>
</body>
</html>
