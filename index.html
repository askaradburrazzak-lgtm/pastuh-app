<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<title>Учёт выпаса скота</title>
<style>
  :root{
    --bg:#1a1a1a;
    --card:#2a2a2a;
    --card-2:#333333;
    --accent:#22c55e;
    --accent-dark:#16a34a;
    --danger:#ef4444;
    --text:#f2f2f2;
    --text-dim:#a3a3a3;
    --border:#3a3a3a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  #app{max-width:640px;margin:0 auto;padding:0 14px;}

  header.topbar{
    display:flex;align-items:center;gap:10px;
    padding:16px 4px 12px 4px;
    position:sticky;top:0;background:var(--bg);z-index:20;
    border-bottom:1px solid var(--border);
  }
  header.topbar h1{
    flex:1;font-size:18px;font-weight:700;margin:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .status-pill{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--text-dim);
    background:var(--card);border:1px solid var(--border);
    padding:5px 10px;border-radius:999px;white-space:nowrap;
  }
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);}
  .status-dot.online{background:var(--accent);}
  .icon-btn{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    width:38px;height:38px;border-radius:10px;font-size:18px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn:active{background:var(--card-2);}

  .banner{
    background:#3a2e12;border:1px solid #7c5b12;color:#f5d78e;
    padding:12px 14px;border-radius:12px;font-size:14px;margin:14px 0;
    line-height:1.4;
  }
  .hidden{display:none !important;}

  .summary-cards{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;
  }
  .summary-card{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:12px 10px;text-align:center;
  }
  .summary-card .val{font-size:18px;font-weight:700;}
  .summary-card .lbl{font-size:11px;color:var(--text-dim);margin-top:4px;}

  .add-client-card{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:16px;margin-bottom:18px;
  }
  .add-client-head{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
  }
  .add-client-head h2{margin:0;font-size:15px;color:var(--text-dim);font-weight:600;}
  .link-btn{
    background:transparent;border:none;color:var(--accent);font-size:13px;
    font-weight:600;padding:4px 0;cursor:pointer;
  }
  #addClientForm{display:flex;gap:8px;flex-wrap:wrap;}
  #addClientForm input{flex:1;min-width:110px;}
  #addClientForm button{flex-shrink:0;}

  input, select, textarea{
    background:var(--card-2);border:1px solid var(--border);color:var(--text);
    padding:11px 12px;border-radius:10px;font-size:15px;width:100%;
    font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  textarea{resize:vertical;min-height:140px;line-height:1.5;}

  button{
    font-family:inherit;font-size:14px;font-weight:600;
    border-radius:10px;border:1px solid var(--border);
    padding:11px 16px;cursor:pointer;background:var(--card-2);color:var(--text);
  }
  button.primary{background:var(--accent);border-color:var(--accent-dark);color:#0a1f10;}
  button.primary:active{background:var(--accent-dark);}
  button.ghost{background:transparent;}
  button.danger-ghost{background:transparent;color:var(--danger);border-color:#5a2323;}

  .clients-empty{
    color:var(--text-dim);text-align:center;padding:30px 10px;font-size:14px;
  }

  .client-card{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:14px 16px;margin-bottom:10px;
  }
  .client-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .client-name{font-size:16px;font-weight:700;}
  .client-heads{font-size:12.5px;color:var(--text-dim);margin-top:2px;}
  .client-debt{font-size:20px;font-weight:800;margin-top:10px;}
  .client-debt.zero{color:var(--accent);}
  .client-actions{display:flex;gap:8px;margin-top:12px;}
  .client-actions button{flex:1;}
  .paid-badge{
    font-size:11px;background:#123a22;color:var(--accent);
    padding:3px 8px;border-radius:999px;border:1px solid var(--accent-dark);
  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:flex;align-items:flex-end;justify-content:center;z-index:100;
  }
  @media(min-width:520px){
    .modal-overlay{align-items:center;}
  }
  .modal{
    background:var(--card);border:1px solid var(--border);
    border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:460px;
    max-height:88vh;overflow-y:auto;
  }
  @media(min-width:520px){
    .modal{border-radius:18px;}
  }
  .modal h2{margin:0 0 16px 0;font-size:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  .lang-switch{display:flex;gap:8px;}
  .lang-switch button{flex:1;padding:9px 6px;font-size:13px;}
  .lang-switch button.active{background:var(--accent);color:#0a1f10;border-color:var(--accent-dark);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions button{flex:1;}
  .hint-text{font-size:12px;color:var(--text-dim);margin:-6px 0 14px 0;line-height:1.5;}
  .import-result{font-size:13px;margin-top:10px;line-height:1.5;}
  .import-result.ok{color:var(--accent);}
  .import-result.err{color:var(--danger);}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <h1 id="farmTitle">—</h1>
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText"></span>
    </div>
    <button class="icon-btn" id="gearBtn" aria-label="Settings">⚙</button>
  </header>

  <main>
    <div class="banner hidden" id="warningBanner"></div>

    <section class="summary-cards" id="summaryCards"></section>

    <section class="add-client-card">
      <div class="add-client-head">
        <h2 data-i18n="addClient"></h2>
        <button type="button" class="link-btn" id="openImportBtn" data-i18n="importOpen"></button>
      </div>
      <form id="addClientForm">
        <input id="newClientName" type="text" required>
        <input id="newClientHeads" type="number" min="1" step="1" required>
        <button type="submit" class="primary" data-i18n="add"></button>
      </form>
    </section>

    <section id="clientsList"></section>
  </main>
</div>

<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <h2 data-i18n="settings"></h2>

    <div class="field">
      <label data-i18n="language"></label>
      <div class="lang-switch" id="langSwitch">
        <button type="button" data-lang-opt="ru">Русский</button>
        <button type="button" data-lang-opt="kk">Қазақша</button>
        <button type="button" data-lang-opt="en">English</button>
      </div>
    </div>

    <div class="field">
      <label data-i18n="farmName"></label>
      <input id="settingFarmName" type="text">
    </div>

    <div class="field">
      <label data-i18n="sheetUrl"></label>
      <input id="settingSheetUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <div class="field">
      <label data-i18n="tariff"></label>
      <input id="settingTariff" type="number" min="0" step="0.01">
    </div>

    <div class="field">
      <label data-i18n="currency"></label>
      <input id="settingCurrency" type="text" list="currencyList" maxlength="6">
      <datalist id="currencyList">
        <option value="₸"></option>
        <option value="₽"></option>
        <option value="$"></option>
        <option value="сом"></option>
      </datalist>
    </div>

    <div class="modal-actions">
      <button type="button" class="ghost" id="settingsCancel" data-i18n="cancel"></button>
      <button type="button" class="primary" id="settingsSave" data-i18n="save"></button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="importModal">
  <div class="modal">
    <h2 data-i18n="importTitle"></h2>
    <p class="hint-text" data-i18n="importHint"></p>
    <div class="field">
      <textarea id="importText" placeholder="Иван Петров, 5&#10;Асан Серіков, 3&#10;Гуля К., 2"></textarea>
    </div>
    <div id="importResult" class="import-result hidden"></div>
    <div class="modal-actions">
      <button type="button" class="ghost" id="importCancel" data-i18n="cancel"></button>
      <button type="button" class="primary" id="importConfirm" data-i18n="importConfirm"></button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEYS = {
    settings: "livestock_app_settings",
    clients: "livestock_app_clients",
    pending: "livestock_app_pending"
  };

  var I18N = {
    ru: {
      settings:"Настройки", language:"Язык интерфейса", farmName:"Название хозяйства / аула",
      sheetUrl:"Ссылка на Google-таблицу (Web App)", tariff:"Тариф за 1 голову скота",
      currency:"Валюта", save:"Сохранить", cancel:"Отмена",
      addClient:"Добавить хозяина скота", add:"Добавить",
      namePlaceholder:"Имя владельца", headsPlaceholder:"Кол-во голов",
      headsLabel:"голов", debtLabel:"Долг", payInFull:"Оплатить полностью",
      delete:"Удалить", paidStatus:"Оплачено",
      noClients:"Пока никого нет. Добавьте первого владельца скота выше.",
      warnNoUrl:"Пожалуйста, зайдите в настройки (шестерёнка) и подключите вашу таблицу.",
      online:"Онлайн", offline:"Офлайн", syncSuffix:"в очереди",
      totalClients:"Хозяев", totalHeads:"Голов скота", totalDebt:"Общий долг",
      defaultFarmTitle:"Учёт выпаса скота",
      confirmDelete:"Удалить этого владельца из списка?",
      importOpen:"Импорт списка",
      importTitle:"Импорт списка владельцев",
      importHint:"Вставьте список, по одному владельцу на строку, в формате: Имя, количество голов. Разделитель — запятая, точка с запятой или табуляция.",
      importConfirm:"Импортировать",
      importOkPrefix:"Добавлено:",
      importErrPrefix:"Не распознано строк:"
    },
    kk: {
      settings:"Баптаулар", language:"Интерфейс тілі", farmName:"Шаруашылық / ауыл атауы",
      sheetUrl:"Google кестесіне сілтеме (Web App)", tariff:"1 бас мал үшін тариф",
      currency:"Валюта", save:"Сақтау", cancel:"Бас тарту",
      addClient:"Мал иесін қосу", add:"Қосу",
      namePlaceholder:"Иесінің аты", headsPlaceholder:"Бас саны",
      headsLabel:"бас", debtLabel:"Борыш", payInFull:"Толық төлеу",
      delete:"Жою", paidStatus:"Төленген",
      noClients:"Әзірге ешкім жоқ. Жоғарыда алғашқы мал иесін қосыңыз.",
      warnNoUrl:"Баптауларға (тісті дөңгелек) кіріп, кестеңізді қосыңыз.",
      online:"Онлайн", offline:"Офлайн", syncSuffix:"кезекте",
      totalClients:"Иелер", totalHeads:"Бас мал", totalDebt:"Жалпы борыш",
      defaultFarmTitle:"Мал жаю есебі",
      confirmDelete:"Бұл иесін тізімнен жоюды қалайсыз ба?",
      importOpen:"Тізімді импорттау",
      importTitle:"Иелер тізімін импорттау",
      importHint:"Әр иесін жаңа жолға былай енгізіңіз: Аты, бас саны. Бөлгіш — үтір, нүктелі үтір немесе табуляция.",
      importConfirm:"Импорттау",
      importOkPrefix:"Қосылды:",
      importErrPrefix:"Танылмаған жолдар:"
    },
    en: {
      settings:"Settings", language:"Interface language", farmName:"Farm / village name",
      sheetUrl:"Google Sheet link (Web App)", tariff:"Rate per 1 head",
      currency:"Currency", save:"Save", cancel:"Cancel",
      addClient:"Add livestock owner", add:"Add",
      namePlaceholder:"Owner name", headsPlaceholder:"Number of head",
      headsLabel:"head", debtLabel:"Debt", payInFull:"Pay in full",
      delete:"Delete", paidStatus:"Paid",
      noClients:"No one here yet. Add the first owner above.",
      warnNoUrl:"Please open settings (gear icon) and connect your spreadsheet.",
      online:"Online", offline:"Offline", syncSuffix:"pending",
      totalClients:"Owners", totalHeads:"Head of stock", totalDebt:"Total debt",
      defaultFarmTitle:"Grazing Ledger",
      confirmDelete:"Remove this owner from the list?",
      importOpen:"Import list",
      importTitle:"Import list of owners",
      importHint:"Paste one owner per line, formatted as: Name, number of head. Separator can be a comma, semicolon, or tab.",
      importConfirm:"Import",
      importOkPrefix:"Added:",
      importErrPrefix:"Unrecognized lines:"
    }
  };

  function defaultSettings(){
    return { lang:"ru", farmName:"", sheetUrl:"", tariff:0, currency:"₸" };
  }

  function loadJSON(key, fallback){
    try{
      var raw = localStorage.getItem(key);
      if(!raw) return fallback;
      var parsed = JSON.parse(raw);
      return parsed === null || parsed === undefined ? fallback : parsed;
    }catch(e){
      return fallback;
    }
  }

  var state = {
    settings: Object.assign(defaultSettings(), loadJSON(STORAGE_KEYS.settings, {})),
    clients: loadJSON(STORAGE_KEYS.clients, []),
    pending: loadJSON(STORAGE_KEYS.pending, []),
    online: navigator.onLine
  };

  function saveSettings(){ localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(state.settings)); }
  function saveClients(){ localStorage.setItem(STORAGE_KEYS.clients, JSON.stringify(state.clients)); }
  function savePending(){ localStorage.setItem(STORAGE_KEYS.pending, JSON.stringify(state.pending)); }

  function t(key){
    var dict = I18N[state.settings.lang] || I18N.ru;
    return dict[key] !== undefined ? dict[key] : key;
  }

  function uid(){
    return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  function formatMoney(n){
    var val = Math.round((Number(n) || 0) * 100) / 100;
    return val.toLocaleString("ru-RU") + " " + (state.settings.currency || "");
  }

  function computeDebt(client){
    var tariff = Number(state.settings.tariff) || 0;
    var total = (Number(client.heads) || 0) * tariff;
    var owed = total - (Number(client.paidTotal) || 0);
    if(owed < 0) owed = 0;
    return { total: total, owed: owed };
  }

  // ---------- rendering ----------

  function applyStaticTranslations(){
    document.querySelectorAll("[data-i18n]").forEach(function(el){
      el.textContent = t(el.getAttribute("data-i18n"));
    });
    document.getElementById("newClientName").placeholder = t("namePlaceholder");
    document.getElementById("newClientHeads").placeholder = t("headsPlaceholder");
    document.querySelectorAll("#langSwitch button").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-lang-opt") === state.settings.lang);
    });
  }

  function renderHeader(){
    document.getElementById("farmTitle").textContent = state.settings.farmName
      ? state.settings.farmName
      : t("defaultFarmTitle");
  }

  function renderStatus(){
    var dot = document.getElementById("statusDot");
    var txt = document.getElementById("statusText");
    dot.classList.toggle("online", state.online);
    var label = state.online ? t("online") : t("offline");
    if(state.pending.length > 0){
      label += " · " + state.pending.length + " " + t("syncSuffix");
    }
    txt.textContent = label;
  }

  function renderWarning(){
    var banner = document.getElementById("warningBanner");
    if(!state.settings.sheetUrl){
      banner.textContent = t("warnNoUrl");
      banner.classList.remove("hidden");
    }else{
      banner.classList.add("hidden");
    }
  }

  function renderSummary(){
    var totalClients = state.clients.length;
    var totalHeads = 0, totalDebt = 0;
    state.clients.forEach(function(c){
      totalHeads += Number(c.heads) || 0;
      totalDebt += computeDebt(c).owed;
    });
    var el = document.getElementById("summaryCards");
    el.innerHTML =
      '<div class="summary-card"><div class="val">' + totalClients + '</div><div class="lbl">' + t("totalClients") + '</div></div>' +
      '<div class="summary-card"><div class="val">' + totalHeads + '</div><div class="lbl">' + t("totalHeads") + '</div></div>' +
      '<div class="summary-card"><div class="val">' + formatMoney(totalDebt) + '</div><div class="lbl">' + t("totalDebt") + '</div></div>';
  }

  function renderClients(){
    var list = document.getElementById("clientsList");
    if(state.clients.length === 0){
      list.innerHTML = '<div class="clients-empty">' + t("noClients") + '</div>';
      return;
    }
    var html = "";
    state.clients.slice().reverse().forEach(function(client){
      var d = computeDebt(client);
      var isPaid = d.owed <= 0;
      html += '' +
        '<div class="client-card" data-id="' + client.id + '">' +
          '<div class="client-top">' +
            '<div>' +
              '<div class="client-name">' + escapeHtml(client.name) + '</div>' +
              '<div class="client-heads">' + client.heads + ' ' + t("headsLabel") + '</div>' +
            '</div>' +
            (isPaid ? '<span class="paid-badge">' + t("paidStatus") + '</span>' : '') +
          '</div>' +
          '<div class="client-debt ' + (isPaid ? "zero" : "") + '">' + formatMoney(d.owed) + '</div>' +
          '<div class="client-actions">' +
            '<button class="primary pay-btn" data-id="' + client.id + '"' + (isPaid ? " disabled" : "") + '>' + t("payInFull") + '</button>' +
            '<button class="danger-ghost del-btn" data-id="' + client.id + '">' + t("delete") + '</button>' +
          '</div>' +
        '</div>';
    });
    list.innerHTML = html;
  }

  function escapeHtml(str){
    var div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  function renderAll(){
    applyStaticTranslations();
    renderHeader();
    renderStatus();
    renderWarning();
    renderSummary();
    renderClients();
  }

  // ---------- sync queue ----------

  function queueAction(action){
    action.ts = Date.now();
    state.pending.push(action);
    savePending();
    renderStatus();
    trySync();
  }

  function trySync(){
    if(!state.online || !state.settings.sheetUrl || state.pending.length === 0){
      return;
    }
    flushPending();
  }

  function flushPending(){
    if(state.pending.length === 0) return;
    var item = state.pending[0];
    fetch(state.settings.sheetUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(item)
    }).then(function(res){
      if(!res || !res.ok){ throw new Error("bad response"); }
      state.pending.shift();
      savePending();
      renderStatus();
      if(state.pending.length > 0){
        flushPending();
      }
    }).catch(function(){
      // остаётся в очереди, попробуем позже (событие online или интервал)
    });
  }

  window.addEventListener("online", function(){
    state.online = true;
    renderStatus();
    trySync();
  });
  window.addEventListener("offline", function(){
    state.online = false;
    renderStatus();
  });
  setInterval(function(){ trySync(); }, 30000);

  // ---------- добавление одного клиента ----------

  function addClient(name, heads){
    var client = {
      id: uid(),
      name: name,
      heads: heads,
      paidTotal: 0,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    state.clients.push(client);
    queueAction({ type: "upsert_client", client: client });
    return client;
  }

  document.getElementById("addClientForm").addEventListener("submit", function(e){
    e.preventDefault();
    var nameInput = document.getElementById("newClientName");
    var headsInput = document.getElementById("newClientHeads");
    var name = nameInput.value.trim();
    var heads = parseInt(headsInput.value, 10);
    if(!name || !heads || heads <= 0) return;

    addClient(name, heads);
    saveClients();
    renderSummary();
    renderClients();
    nameInput.value = "";
    headsInput.value = "";
    nameInput.focus();
  });

  document.getElementById("clientsList").addEventListener("click", function(e){
    var payBtn = e.target.closest(".pay-btn");
    var delBtn = e.target.closest(".del-btn");

    if(payBtn && !payBtn.disabled){
      var id1 = payBtn.getAttribute("data-id");
      var client = state.clients.find(function(c){ return c.id === id1; });
      if(!client) return;
      var d = computeDebt(client);
      client.paidTotal = (Number(client.paidTotal) || 0) + d.owed;
      client.updatedAt = Date.now();
      saveClients();
      queueAction({ type: "payment", clientId: client.id, amount: d.owed, paidAt: Date.now() });
      renderSummary();
      renderClients();
      return;
    }

    if(delBtn){
      var id2 = delBtn.getAttribute("data-id");
      if(!confirm(t("confirmDelete"))) return;
      state.clients = state.clients.filter(function(c){ return c.id !== id2; });
      saveClients();
      queueAction({ type: "delete_client", clientId: id2 });
      renderSummary();
      renderClients();
      return;
    }
  });

  // ---------- настройки ----------

  var settingsModal = document.getElementById("settingsModal");
  var pendingLangChoice = state.settings.lang;

  function openSettings(){
    pendingLangChoice = state.settings.lang;
    document.getElementById("settingFarmName").value = state.settings.farmName || "";
    document.getElementById("settingSheetUrl").value = state.settings.sheetUrl || "";
    document.getElementById("settingTariff").value = state.settings.tariff || 0;
    document.getElementById("settingCurrency").value = state.settings.currency || "";
    applyStaticTranslations();
    settingsModal.classList.remove("hidden");
  }

  function closeSettings(){
    settingsModal.classList.add("hidden");
  }

  document.getElementById("gearBtn").addEventListener("click", openSettings);
  document.getElementById("settingsCancel").addEventListener("click", closeSettings);
  settingsModal.addEventListener("click", function(e){
    if(e.target === settingsModal) closeSettings();
  });

  document.getElementById("langSwitch").addEventListener("click", function(e){
    var btn = e.target.closest("button[data-lang-opt]");
    if(!btn) return;
    pendingLangChoice = btn.getAttribute("data-lang-opt");
    state.settings.lang = pendingLangChoice;
    applyStaticTranslations();
  });

  document.getElementById("settingsSave").addEventListener("click", function(){
    state.settings.lang = pendingLangChoice;
    state.settings.farmName = document.getElementById("settingFarmName").value.trim();
    state.settings.sheetUrl = document.getElementById("settingSheetUrl").value.trim();
    state.settings.tariff = parseFloat(document.getElementById("settingTariff").value) || 0;
    state.settings.currency = document.getElementById("settingCurrency").value.trim() || "₸";
    saveSettings();
    closeSettings();
    renderAll();
    trySync();
  });

  // ---------- импорт списка ----------

  var importModal = document.getElementById("importModal");
  var importResultEl = document.getElementById("importResult");

  function openImport(){
    document.getElementById("importText").value = "";
    importResultEl.classList.add("hidden");
    importResultEl.textContent = "";
    applyStaticTranslations();
    importModal.classList.remove("hidden");
  }

  function closeImport(){
    importModal.classList.add("hidden");
  }

  document.getElementById("openImportBtn").addEventListener("click", openImport);
  document.getElementById("importCancel").addEventListener("click", closeImport);
  importModal.addEventListener("click", function(e){
    if(e.target === importModal) closeImport();
  });

  function parseImportLine(line){
    var parts = line.split(/[,;\t]+/);
    if(parts.length < 2) return null;

    var headsRaw = parts[parts.length - 1].trim();
    var heads = parseInt(headsRaw.replace(/[^\d]/g, ""), 10);
    var name = parts.slice(0, parts.length - 1).join(",").trim();

    if(!name || !heads || heads <= 0) return null;
    return { name: name, heads: heads };
  }

  document.getElementById("importConfirm").addEventListener("click", function(){
    var raw = document.getElementById("importText").value;
    var lines = raw.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });

    var added = 0;
    var failed = 0;

    lines.forEach(function(line){
      var parsed = parseImportLine(line);
      if(parsed){
        addClient(parsed.name, parsed.heads);
        added++;
      } else {
        failed++;
      }
    });

    if(added > 0){
      saveClients();
      renderSummary();
      renderClients();
    }

    importResultEl.classList.remove("hidden");
    if(added === 0 && failed === 0){
      importResultEl.className = "import-result err";
      importResultEl.textContent = "";
    } else {
      var msg = t("importOkPrefix") + " " + added;
      if(failed > 0){
        msg += " · " + t("importErrPrefix") + " " + failed;
        importResultEl.className = "import-result err";
      } else {
        importResultEl.className = "import-result ok";
      }
      importResultEl.textContent = msg;
    }

    if(added > 0 && failed === 0){
      setTimeout(closeImport, 900);
    }
  });

  // ---------- инициализация ----------

  renderAll();
  trySync();

})();
</script>
</body>
</html>
